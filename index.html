<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURE - Research with Computer Science</title>
    <!-- Sci-Fi Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tron-cyan: #0ff;
            --tron-orange: #ff8c00;
            --bg-color: #020205;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Grid Background */
        .grid-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 800px;
            z-index: 0;
            overflow: hidden;
        }

        .grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            bottom: -60vh;
            left: -50vw;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 80px 80px;
            transform: rotateX(75deg);
            animation: gridMove 3s linear infinite;
            border-top: 3px solid rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6) inset, 0 -20px 50px rgba(0, 255, 255, 0.3);
        }

        @keyframes gridMove {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(80px); }
        }

        /* Swipe scan with dark corner effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.9) 120%);
            pointer-events: none;
            z-index: 11;
        }

        /* SVG Canvas */
        #main-svg {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100vh;
            display: block;
        }

        /* Target font styles */
        #target-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 130px;
            letter-spacing: 15px;
            fill: transparent;
            stroke: var(--tron-cyan);
            stroke-width: 3px;
            stroke-dasharray: 40 20;
            animation: dashFlow 1s linear infinite;
            
            /* Add transform and opacity filter effects, prepare for text reveal*/
            transition: fill 1.5s ease, filter 1.5s ease, stroke-width 1.5s ease, transform 0.8s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.8s ease-in;
            transform-origin: 600px 450px; /* Ensure canvas center aligned with Title center */
            filter: url(#cyanGlow);
        }

        @keyframes dashFlow {
            to { stroke-dashoffset: -60; }
        }

        /* Final touch - text glowing effects */
        #target-text.filled {
            fill: #fff;
            stroke-width: 0;
            stroke-dasharray: none;
            animation: none;
            filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px var(--tron-cyan)) drop-shadow(0 0 50px var(--tron-cyan)) drop-shadow(0 0 80px var(--tron-cyan));
        }

        /* System Terminal style background texts */
        .status-text {
            position: absolute;
            top: 30px;
            left: 40px;
            color: var(--tron-cyan);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 6;
            opacity: 0.8;
            text-shadow: 0 0 5px var(--tron-cyan);
        }
        
        .status-text span {
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* nav-menu (System Terminal style) */
        .nav-menu {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 20;
            display: flex;
            gap: 30px;
        }

        .nav-item {
            color: #5bb3b3;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(91, 179, 179, 0.6);
            transition: color 0.3s ease, text-shadow 0.3s ease;
            display: flex;
            align-items: center;
        }

        .nav-item::before {
            content: '>';
            margin-right: 8px;
            opacity: 0;
            color: var(--tron-cyan);
            transition: opacity 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
            transform: translateX(-10px);
        }

        .nav-item:hover, .nav-item.flash-active {
            color: var(--tron-cyan);
            text-shadow: 0 0 8px var(--tron-cyan), 0 0 15px var(--tron-cyan), 0 0 30px var(--tron-cyan);
        }

        .nav-item:hover::before {
            opacity: 1;
            transform: translateX(0);
            text-shadow: 0 0 8px var(--tron-cyan);
        }

    </style>
</head>
<body>

    <!-- background effects -->
    <div class="grid-container">
        <div class="grid"></div>
    </div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- System status prompts -->
    <div class="status-text">SYSTEM > <span id="status-msg">INITIALIZING...</span></div>

    <!-- System Terminal style menu with hyperlinks -->
    <nav class="nav-menu">
        <a href="#" class="nav-item">Home</a>
        <a href="#" class="nav-item">Works</a>
        <a href="#" class="nav-item">About</a>
        <!-- ID contact for tracking -->
        <a href="#" class="nav-item" id="contact-link">Contact</a>
    </nav>

    <!-- Main SVG canvas -->
    <svg id="main-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
        <defs>
            <!-- cyanGlow neon filter -->
            <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur3" />
                <feMerge>
                    <feMergeNode in="blur3" />
                    <feMergeNode in="blur2" />
                    <feMergeNode in="blur1" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <!-- Orange Glow neon filter -->
            <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur3" />
                <feMerge>
                    <feMergeNode in="blur3" />
                    <feMergeNode in="blur2" />
                    <feMergeNode in="blur1" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <!-- Mask for the texts restage -->
            <clipPath id="text-clip">
                <rect id="clip-rect" x="0" y="0" width="0" height="1200" />
            </clipPath>
        </defs>

        <!-- Target texts -->
        <text id="target-text" x="600" y="450" text-anchor="middle">LENO TSAI</text>

        <!-- Laser bean -->
        <line id="laser-beam" x1="0" y1="0" x2="0" y2="0" stroke="#fff" stroke-width="4" filter="url(#orangeGlow)" style="opacity: 0;" />
        
        <!-- spark effects -->
        <circle id="spark" cx="0" cy="0" r="0" fill="#fff" filter="url(#orangeGlow)" style="opacity: 0;" />
    </svg>

    <script>
        window.addEventListener('load', () => {
            document.fonts.ready.then(() => {
                const statusMsg = document.getElementById('status-msg');
                setTimeout(() => {
                    statusMsg.innerText = "DRAWING PROTOCOL ENGAGED";
                    startLaserAnimation();
                }, 1500);
            });
        });

        function startLaserAnimation() {
            const svg = document.getElementById('main-svg');
            const text = document.getElementById('target-text');
            const clipRect = document.getElementById('clip-rect');
            const beam = document.getElementById('laser-beam');
            const spark = document.getElementById('spark');
            const statusMsg = document.getElementById('status-msg');
            const contactLink = document.getElementById('contact-link');

            const bbox = text.getBBox();
            
            text.setAttribute('clip-path', 'url(#text-clip)');
            clipRect.setAttribute('x', 0);
            clipRect.setAttribute('y', bbox.y - 100);
            
            const startX = bbox.x - 30;
            const endX = bbox.x + bbox.width + 40;
            const textCenterY = bbox.y + bbox.height / 2;

            let startTime = null;
            const duration = 4000; 

            setTimeout(() => {
                beam.style.opacity = 1;
                spark.style.opacity = 1;
                requestAnimationFrame(drawFrame);
            }, 500);

            function drawFrame(time) {
                if (!startTime) startTime = time;
                let elapsed = time - startTime;
                let progress = Math.min(elapsed / duration, 1);

                let currentX = startX + (endX - startX) * progress;
                clipRect.setAttribute('width', currentX + 10);

                let mainFreq = 30;
                let jitterFreq = 75;
                let scribbleY = textCenterY 
                              + Math.sin(progress * Math.PI * mainFreq) * (bbox.height * 0.4)
                              + Math.cos(progress * Math.PI * jitterFreq) * (bbox.height * 0.15);

                beam.setAttribute('x1', currentX);
                beam.setAttribute('y1', 0);
                beam.setAttribute('x2', currentX);
                beam.setAttribute('y2', scribbleY);

                spark.setAttribute('cx', currentX);
                spark.setAttribute('cy', scribbleY);
                spark.setAttribute('r', 4 + Math.random() * 5);

                if (progress < 1) {
                    requestAnimationFrame(drawFrame);
                } else {
                    beam.style.opacity = 0;
                    spark.style.opacity = 0;
                    statusMsg.innerText = "IDENTITY COMPILED";

                    // 1. Glowing texts
                    setTimeout(() => {
                        text.classList.add('filled');
                        
                        // 2. 2-sec pause before contact link animation
                        setTimeout(() => {
                            statusMsg.innerText = "DATA TRANSFERRING...";
                            
                            // Remove text clip path for animation
                            text.removeAttribute('clip-path');

                            // Get the center coordinates of Contact
                            const rect = contactLink.getBoundingClientRect();
                            const targetX = rect.left + rect.width / 2;
                            const targetY = rect.top + rect.height / 2;

                            // create SVG point, and matrix Transform SVG viewBox
                            const pt = svg.createSVGPoint();
                            pt.x = targetX;
                            pt.y = targetY;
                            const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());

                            // Calc vecters for animation (Original coordinate: x=600, y=450)
                            const dx = svgPt.x - 600;
                            const dy = svgPt.y - 450;

                            // CSS animation: resize, move, fadeout
                            text.style.transform = `translate(${dx}px, ${dy}px) scale(0.02)`;
                            text.style.opacity = '0';

                            // Contact glow effects when previous animation ends
                            // Contact "absorbed" the animation
                            setTimeout(() => {
                                contactLink.classList.add('flash-active');
                                statusMsg.innerText = "TRANSFER COMPLETE";
                                
                                setTimeout(() => {
                                    contactLink.classList.remove('flash-active');
                                    statusMsg.innerText = "SYSTEM STANDBY";
                                }, 600); // Glowing effects duration

                            }, 700); // Reply CSS transform animation duration time setting: 0.8s

                        }, 2000); // 2-sec pause


                    }, 300);
                }
            }
        }
    </script>
</body>
</html>
