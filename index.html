<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- Optimized viewport for iPhone 12 Pro (390x844) and other modern devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NATURE - Research with Computer Science</title>
    <!-- Sci-Fi Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./components/style.css">
</head>
<body>

    <!-- background effects -->
    <div class="grid-container">
        <div class="grid"></div>
    </div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- System status prompts -->
    <div class="status-text">NATURE OS > <span id="status-msg">INITIALIZING...</span></div>

    <!-- System Terminal style menu with Dropdown -->
    <nav class="nav-menu">
        <div class="nav-item-wrapper">
            <a href="#" class="nav-item">Home</a>
        </div>
        
        <!-- Works with Dropdown -->
        <div class="nav-item-wrapper">
            <div class="nav-item">Works</div>
            <div class="dropdown-content">
                <!-- Added target="_blank" to open in a new window/tab -->
                <a href="./game_of_life/" class="dropdown-item" target="_blank" rel="noopener noreferrer">> GAME OF LIFE</a>
                <!-- Future items can be added here -->
            </div>
        </div>

        <div class="nav-item-wrapper">
            <a href="#" class="nav-item">About</a>
        </div>
        
        <div class="nav-item-wrapper">
            <a href="#" class="nav-item" id="contact-link">Contact</a>
        </div>
    </nav>

    <!-- Main SVG canvas -->
    <svg id="main-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
        <defs>
            <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur3" />
                <feMerge>
                    <feMergeNode in="blur3" />
                    <feMergeNode in="blur2" />
                    <feMergeNode in="blur1" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
                <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
                <feMerge>
                    <feMergeNode in="blur2" />
                    <feMergeNode in="blur1" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <clipPath id="text-clip">
                <rect id="clip-rect" x="0" y="0" width="0" height="1200" />
            </clipPath>
        </defs>

        <text id="target-text" x="600" y="420" text-anchor="middle">LENO TSAI</text>

        <line id="laser-beam" x1="0" y1="0" x2="0" y2="0" stroke="#fff" stroke-width="4" filter="url(#orangeGlow)" style="opacity: 0;" />
        <circle id="spark" cx="0" cy="0" r="0" fill="#fff" filter="url(#orangeGlow)" style="opacity: 0;" />
    </svg>

    <script src="./components/script.js"></script>
</body>
</html>
